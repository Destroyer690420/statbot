services:
  # Bot + API (single container)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reddit-task-manager
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - insight-uploads:/app/uploads
    networks:
      - app-network

  # Redis (for BullMQ job queue)
  redis:
    image: redis:7-alpine
    container_name: rtm-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save "" --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app-network

  # Dashboard (React frontend)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rtm-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - app-network

volumes:
  insight-uploads:
  redis-data:

networks:
  app-network:
    driver: bridge
